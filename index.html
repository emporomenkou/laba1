<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whirl</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->

    <header>
        <div class="container flex">
            <div class="logo">
                <a href="/"></a>
                <img src="assets/whirllogo.svg" alt="whirl logo">
                <span>Whirl</span>
            </div>
            <nav>
                <a href="#">Features</a>
                <a href="#">Pricing</a>
                <a href="#">Integrations</a>
                <a href="#">Learn</a>
            </nav>
            <button class="blue-button">Sign in</button>
            <button class="white-button">Book a demo</button>            
        </div>
    </header>


    <!-- Main -->

    <main>
        <section class="description">
            <div class="container">
                <div>
                    <h1>Your everyday
                        tasks, automated.</h1>
                    <p class="basic-text description-text">
                        Whirl lets you design and streamline
                        your everyday tasks and workflows
                        in just a few clicks.</p>
                    <div>
                        <button class="white-button">Book a demo</button>
                        <button class="blue-button">Learn more</button>                    
                    </div>
                </div>
                <img src="assets/doskokvadr.jpg" alt="doska s kvadratami">
            </div>
        </section>
        <section class="trusted">
            <div class="container">
                <p class="basic-text trusted-text">Trusted by 50,000+ companies</p>
                <div class="trusted-images">
                    <img src="assets/focusfox.svg" alt="focusfox">
                    <img src="assets/nowintech.svg" alt="NowInTech">
                    <img src="assets/optimer.svg" alt="Optimer">
                    <img src="assets/carded.svg" alt="Carded">
                </div>
            </div>
        </section>
        <section class="advantages">
            <div class="container">


            </div>
        </section>
    </main>

    <!-- Footer -->
     
    <footer>

    </footer>
</body>
</html>
